name: Auto Stream Notifier

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Playwright
        run: npm install -g playwright

      - name: Check Twitch stream status
        id: twitch
        run: |
          node << 'EOF'
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            await page.goto('https://www.twitch.tv/daddington77', { waitUntil: 'networkidle' });

            const isLive = await page.evaluate(() => {
              return document.body.innerText.includes('LIVE');
            });

            const title = await page.evaluate(() => {
              const titleEl = document.querySelector('h1');
              return titleEl ? titleEl.innerText : '';
            });

            const game = await page.evaluate(() => {
              const gameEl = document.evaluate("//span[contains(@class, 'CoreText')]", document, null, XPathResult.FIRST_ORDERED_NODE_TYPE, null).singleNodeValue;
              return gameEl ? gameEl.innerText : 'Stream';
            });

            console.log(`::set-output name=is_live::${isLive}`);
            console.log(`::set-output name=title::${title || 'Stream'}`);
            console.log(`::set-output name=game::${game}`);

            await browser.close();
          })();
          EOF

      - name: Load previous state
        id: state
        run: |
          if [ -f .github/stream-state.json ]; then
            was_live=$(jq -r '.live' .github/stream-state.json)
            echo "was_live=$was_live" >> $GITHUB_OUTPUT
          else
            echo "was_live=false" >> $GITHUB_OUTPUT
          fi

      - name: Save current state
        run: |
          mkdir -p .github
          echo "{\"live\":${{ steps.twitch.outputs.is_live }},\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > .github/stream-state.json
          git config --local user.email "action@github.com"
          git config --local user.name "stream-notifier"
          git add .github/stream-state.json
          git commit -m "update stream state" || true
          git push || true

      - name: Update channel name to LIVE
        if: steps.twitch.outputs.is_live == 'true'
        run: |
          curl -X PATCH "https://discord.com/api/v10/channels/1491668777702785046" \
            -H "Authorization: Bot ${{ secrets.DISCORD_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name": "🟢-livestream"}'

      - name: Update channel name to OFFLINE
        if: steps.twitch.outputs.is_live == 'false'
        run: |
          curl -X PATCH "https://discord.com/api/v10/channels/1491668777702785046" \
            -H "Authorization: Bot ${{ secrets.DISCORD_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name": "🔘-offline"}'

      - name: Post notification when goes live
        if: steps.twitch.outputs.is_live == 'true' && steps.state.outputs.was_live == 'false'
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{
              "content": "",
              "embeds": [{
                "title": "${{ steps.twitch.outputs.title }}",
                "description": "**daddington77 is LIVE on Twitch!**",
                "url": "https://twitch.tv/daddington77",
                "color": 65280,
                "fields": [
                  {"name": "Game", "value": "${{ steps.twitch.outputs.game }}", "inline": true},
                  {"name": "Watch", "value": "[Join Stream](https://twitch.tv/daddington77)", "inline": true}
                ],
                "footer": {"text": "Daddington77 Break Store"}
              }]
            }'
